services:

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - joplin
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./credentials:/app/credentials
      - ./config.json:/app/config.json:ro
    # Pass --debug flags at runtime:
    #   docker compose run bot --debug --debug-time "2026-03-24 07:25"

  joplin:
    build:
      context: ./joplin
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env           # provides JOPLIN_API_TOKEN
    volumes:
      - joplin_data:/root/.config/joplin
    ports:
      # Expose externally only if you need to curl the API from the host.
      # The bot container reaches joplin via Docker DNS (http://joplin:41184).
      - "41184:41184"

volumes:
  joplin_data:
