# Production overrides — used on mbox.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:

  bot:
    container_name: eva-bot-prod
    restart: always

  joplin:
    container_name: eva-joplin-prod
    restart: always
    volumes:
      - eva-joplin-data-prod:/root/.config/joplin
    ports: []
    # No host port binding — bot reaches Joplin via Docker internal network only.

volumes:
  eva-joplin-data-prod:
